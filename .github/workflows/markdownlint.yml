name: Markdown Lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: ".markdownlint.json"
          globs: |
            **/*.md
            !site/**
