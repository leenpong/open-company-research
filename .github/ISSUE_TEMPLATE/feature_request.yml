name: 🚀 功能建议
description: 为知识库提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望增加或改进的内容。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个建议解决了什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望实现什么？可包含示例或参考。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他做法。
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 其他上下文、截图或链接。
  - type: checkboxes
    id: checks
    attributes:
      label: 确认
      options:
        - label: 我已搜索过现有 Issue，确认没有重复。
          required: true
