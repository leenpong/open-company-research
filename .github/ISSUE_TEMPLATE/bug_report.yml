name: 🐛 Bug 报告
description: 报告站点、构建、链接或内容中的错误
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告问题！请尽量填写以下信息，以便我们快速定位。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个 Bug。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何触发该问题？
      placeholder: |
        1. 打开页面 '...'
        2. 点击 '...'
        3. 出现错误 '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你原本期望发生什么？
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: 相关页面 / 文件
      description: 出问题的文档路径或 URL。
      placeholder: docs/05-case-study/nvidia.md
  - type: textarea
    id: context
    attributes:
      label: 环境与补充信息
      description: 浏览器、操作系统、截图等。
  - type: checkboxes
    id: checks
    attributes:
      label: 确认
      options:
        - label: 我已搜索过现有 Issue，确认没有重复。
          required: true
